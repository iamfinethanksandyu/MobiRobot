name: 编译 MobiRobot MFC 程序

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 MSBuild 环境
        uses: microsoft/setup-msbuild@v2

      - name: 编译 Release 版本
        run: msbuild MobiRobot.sln /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143

      - name: 上传生成的 exe
        uses: actions/upload-artifact@v4
        with:
          name: MobiRobot-编译结果
          path: |
            Release/MobiRobot.exe
            Release/*.dll
