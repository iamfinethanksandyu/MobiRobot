name: Build MobiRobot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild MobiRobot.sln /p:Configuration=Release /p:Platform=Win32

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MobiRobot-EXE
          path: Release/
