name: 编译 MobiRobot
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 编译项目
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
          msbuild MobiRobot.sln /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143

      - name: 上传 exe
        uses: actions/upload-artifact@v4
        with:
          name: MobiRobot
          path: Release/
