name: 编译 MobiRobot
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 自动升级项目从 VS2010 到 VS2022
      - name: 升级项目版本
        run: |
          $file = Get-Content "MobiRobot/MobiRobot.vcxproj" -Raw
          $file = $file -replace "PlatformToolset>v100<","PlatformToolset>v143<"
          Set-Content "MobiRobot/MobiRobot.vcxproj" -Value $file

      # 2. 加载 MSBuild 环境
      - name: 设置 MSBuild
        uses: microsoft/setup-msbuild@v2

      # 3. 开始编译
      - name: 编译程序
        run: msbuild MobiRobot.sln /p:Configuration=Release /p:Platform=Win32

      # 4. 上传 EXE
      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: MobiRobot_EXE
          path: Release/
