name: 编译 MobiRobot
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 MSBuild
        uses: microsoft/setup-msbuild@v1.1
        
      - name: 编译项目
        shell: cmd
        run: |
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
          msbuild MobiRobot.sln /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143 /v:detailed
          
      - name: 上传 exe
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: MobiRobot
          path: Release/
